name: 2FAuth
options:
  deploymentTarget:
    iOS: "17.0"

targets:
  2FAuth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: 2FAuthWatch
        embed: true
    sources:
      - path: AppIcon.icon
        buildPhase: resources
      - path: Sources
        excludes:
          - Config/AppConfigStore.swift
          - Security/CryptoStore.swift
          - Security/SecretStore.swift
      - path: Watch/Sources/WatchAccountStore.swift
      - path: Watch/Sources/WatchSecretStore.swift
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        DEVELOPMENT_TEAM: 64C39764NA
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanep.2fauth
        PRODUCT_NAME: 2FAuth
        PRODUCT_MODULE_NAME: TwoFAuth
        MARKETING_VERSION: 0.0.1
        CURRENT_PROJECT_VERSION: 2
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "2FAuth Companion"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        SWIFT_VERSION: 6.0
    scheme:
      testTargets:
        - 2FAuthTests
        - 2FAuthUITests

  2FAuthTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/Unit
    dependencies:
      - target: 2FAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanep.2fauthTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0

  2FAuthUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UI
    dependencies:
      - target: 2FAuth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanep.2fauthUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0

  2FAuthWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchIcon.icon
        buildPhase: resources
      - path: Watch/Sources
      - path: Sources/Shared
      - path: Sources/TOTP
    settings:
      base:
        DEVELOPMENT_TEAM: 64C39764NA
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanep.2fauth.watchos
        PRODUCT_NAME: 2FAuthWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchIcon
        MARKETING_VERSION: 0.0.1
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "2FAuth Companion"
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ryanep.2fauth
        SWIFT_VERSION: 6.0
    scheme:
      testTargets:
        - 2FAuthWatchUITests

  2FAuthWatchUITests:
    type: bundle.ui-testing
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Tests/WatchUI
    dependencies:
      - target: 2FAuthWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanep.2fauth.watchUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
